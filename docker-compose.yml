services:
  pg:
    image: postgres:16-alpine
    env_file:
      - /schedulerservice/.env.local
    restart: always
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 2s
    volumes:
      - ./schedulerservice/docker/init-db:/docker-entrypoint-initdb.d
      - scheduler_pg_data:/var/lib/postgresql/data
    networks:
      app-network:
  pg-notification:
    image: postgres:16-alpine
    env_file:
      - /notification-service/.env.local
    restart: always
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 2s
    volumes:
      - ./notification-service/docker/init-db:/docker-entrypoint-initdb.d
      - notification_pg_data:/var/lib/postgresql/data
    networks:
      app-network:
  rabbitmq:
    image: rabbitmq:3-management
    env_file:
      - .env.root
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      app-network:

volumes:
  notification_pg_data:
  scheduler_pg_data:
  rabbitmq_data:

networks:
  app-network:
    driver: bridge