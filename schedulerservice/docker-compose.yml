services:
  pg:
    image: postgres:16-alpine
    env_file:
      - .env.local
    restart: always
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 2s
    volumes:
      - ./docker/init-db:/docker-entrypoint-initdb.d
      - scheduler_pg_data:/var/lib/postgresql/data
    networks:
      app-network:
  rabbitmq:
    image: rabbitmq:3-management
    env_file:
      - .env.local
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      app-network:
  scheduler:
    env_file:
      - .env
      - .env.local
    environment:
      DOCKER: "true"
    build:
      context: .
    ports:
      - "3304:3304"
    restart: unless-stopped
    depends_on:
      pg:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      app-network:
   
  worker:
    env_file:
      - .env
      - .env.local
    build:
      context: .
    restart: unless-stopped
    healthcheck:
      disable: true
    working_dir: /app
    command: sh -c "npm run build && npm run worker"
    depends_on:
      pg:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      app-network:
    volumes:
      - ./:/app           
      - /app/dist  
    
volumes:
  scheduler_pg_data:
  rabbitmq_data:
networks:
  app-network:
    driver: bridge