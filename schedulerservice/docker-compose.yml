services:
  pg:
    image: postgres:16-alpine
    env_file:
      - .env.local
    restart: always
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 2s
    volumes:
      - ./docker/init-db:/docker-entrypoint-initdb.d
      - scheduler_pg_data:/var/lib/postgresql/data
  rabbitmq:
    image: rabbitmq:3-management
    env_file:
      - .env.local
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
  scheduler-service:
    env_file:
      - .env
      - .env.local
    environment:
      DOCKER: "true"
    build:
      context: .
    ports:
      - "3304:3304"
    restart: unless-stopped
    depends_on:
      pg:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  scheduler_pg_data:
  rabbitmq_data: